spring.application.name=app
server.port=8082

# =============================
# MYSQL DATABASE (Primary)
# =============================

spring.datasource.mysql.jdbc-url=jdbc:mysql://localhost:3306/hirepathdb
spring.datasource.mysql.username=root
spring.datasource.mysql.password=${MYSQL_PASS}
spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver


# =============================
# MARIADB DATABASE (Vector DB)
# =============================

spring.datasource.mariadb.jdbc-url=jdbc:mariadb://localhost:3308/dsaleet
spring.datasource.mariadb.username=root
spring.datasource.mariadb.password=${MARIADB_PASS}
spring.datasource.mariadb.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# =============================
# JPA
# =============================

spring.jpa.hibernate.ddl-auto=update


# =============================
# Gemini AI
# =============================



spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash

spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.text.options.model=models/gemini-embedding-001

spring.autoconfigure.exclude=org.springframework.ai.vectorstore.mariadb.autoconfigure.MariaDbStoreAutoConfiguration

# =============================
# VECTOR STORE
# =============================
#spring.ai.vectorstore.mariadb.datasource=mariadb
spring.ai.vectorstore.mariadb.initialize-schema=false
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=3072
spring.ai.vectorstore.mariadb.embedding-type=FLOAT32
spring.ai.vectorstore.mariadb.embedding-conversion=FLOAT64_TO_FLOAT32


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=amansingh16011973@gmail.com
spring.mail.password=${GMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
